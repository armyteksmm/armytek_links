<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ARMYTEK links — official website and social media.">
  <title>ARMYTEK — Links</title>
  <style>
    :root {
      --yellow: #ffcc00;
      --black: #000000;
      --bg: #070707;
      --card: rgba(18, 18, 18, 0.86);
      --text: #f7f7f7;
      --muted: #d8d8d8;
      --shadow-soft: 0 22px 60px rgba(0, 0, 0, 0.48);
      --shadow-button: 0 14px 28px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100svh;
      margin: 0;
      font-family: "Muller", "Arial", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 204, 0, 0.18), transparent 34rem),
        linear-gradient(180deg, #171717 0%, #111111 54%, #050505 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.45), transparent 70%);
    }

    .page {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 28px 16px;
    }

    .profile-card {
      width: min(100%, 480px);
      padding: 28px 18px 22px;
      text-align: center;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .avatar-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 128px;
      height: 128px;
      aspect-ratio: 1 / 1;
      padding: 5px;
      margin-bottom: 18px;
      background: var(--yellow);
      border-radius: 50%;
      box-shadow: 0 16px 34px rgba(255, 204, 0, 0.34);
    }

    .avatar {
      display: block;
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border: 4px solid var(--text);
      border-radius: 50%;
      background: var(--black);
    }

    .brand-name {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.15rem, 10vw, 3.35rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0.055em;
    }

    .description {
      max-width: 390px;
      margin: 14px auto 24px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .links {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .button-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 58px;
      padding: 15px 18px;
      border: 2px solid var(--black);
      border-radius: 20px;
      color: var(--text);
      background: var(--black);
      box-shadow: var(--shadow-button);
      font-size: 1.02rem;
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease, color 180ms ease;
    }

    .button-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.42);
    }

    .button-link:active { transform: translateY(-1px); }

    .button-link:focus-visible {
      outline: 3px solid var(--yellow);
      outline-offset: 4px;
    }

    .button-link.official {
      color: var(--black);
      background: var(--yellow);
      text-shadow: none;
    }

    .button-link.official:hover { background: #ffd83d; }

    .button-link.social {
      gap: 12px;
      justify-content: flex-start;
      padding-inline: 16px 22px;
      text-align: left;
    }

    .button-link.social .label {
      flex: 1;
      text-align: center;
      transform: translateX(-22px);
    }

    .icon-badge {
      display: inline-flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 15px;
      color: var(--black);
      background: var(--yellow);
    }

    .icon-badge svg {
      display: block;
      width: 23px;
      height: 23px;
      fill: currentColor;
    }

    .tagline {
      margin: 26px 0 0;
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    @media (min-width: 520px) {
      .page { padding: 42px 24px; }
      .profile-card { padding: 34px 28px 26px; }
      .button-link { min-height: 62px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }

      .button-link:hover { transform: none; }
    }
  </style>
</head>
